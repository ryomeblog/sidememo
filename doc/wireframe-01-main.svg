<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 620" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>SideMemo - メイン画面ワイヤーフレーム（2ペイン・即時プレビュー型）</title>
  <desc>サイドパネル幅520px想定。検索バー、タグフィルタ、メモ一覧、ツールバー付きWYSIWYGエディタを表示。</desc>

  <!-- 背景 -->
  <rect width="720" height="620" fill="#F1EFE8"/>

  <!-- 画面タイトル -->
  <text x="360" y="28" font-size="13" fill="#5F5E5A" text-anchor="middle">画面1: メイン画面（2ペイン・即時プレビュー型エディタ）</text>

  <!-- パネル本体 -->
  <g transform="translate(100, 50)">
    <rect width="520" height="540" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5" rx="8"/>

    <!-- ヘッダー: 検索 + 新規 + 設定 -->
    <g>
      <rect x="0" y="0" width="520" height="40" fill="#FFFFFF"/>
      <line x1="0" y1="40" x2="520" y2="40" stroke="#D3D1C7" stroke-width="0.5"/>

      <!-- 検索ボックス -->
      <rect x="12" y="8" width="380" height="24" fill="#F1EFE8" rx="6"/>
      <circle cx="22" cy="20" r="4" fill="none" stroke="#888780" stroke-width="1.5"/>
      <line x1="25" y1="23" x2="28" y2="26" stroke="#888780" stroke-width="1.5"/>
      <text x="34" y="24" font-size="12" fill="#888780">検索...</text>

      <!-- + 新規 -->
      <rect x="402" y="8" width="58" height="24" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5" rx="6"/>
      <text x="431" y="24" font-size="12" fill="#2C2C2A" text-anchor="middle">+ 新規</text>

      <!-- 設定 -->
      <rect x="468" y="8" width="40" height="24" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5" rx="6"/>
      <text x="488" y="24" font-size="13" fill="#2C2C2A" text-anchor="middle">⚙</text>
    </g>

    <!-- タグフィルタバー -->
    <g transform="translate(0, 40)">
      <rect width="520" height="32" fill="#FFFFFF"/>
      <line x1="0" y1="32" x2="520" y2="32" stroke="#D3D1C7" stroke-width="0.5"/>
      <text x="12" y="20" font-size="11" fill="#5F5E5A">タグ:</text>
      <!-- 選択中: Inbox -->
      <rect x="42" y="8" width="50" height="18" fill="#EEEDFE" rx="9"/>
      <text x="67" y="20" font-size="11" fill="#3C3489" text-anchor="middle">Inbox</text>
      <!-- Idea -->
      <rect x="98" y="8" width="42" height="18" fill="#F1EFE8" rx="9"/>
      <text x="119" y="20" font-size="11" fill="#5F5E5A" text-anchor="middle">Idea</text>
      <!-- Work -->
      <rect x="146" y="8" width="44" height="18" fill="#F1EFE8" rx="9"/>
      <text x="168" y="20" font-size="11" fill="#5F5E5A" text-anchor="middle">Work</text>
      <!-- クリア -->
      <text x="508" y="20" font-size="11" fill="#888780" text-anchor="end">クリア</text>
    </g>

    <!-- 本体: 左ペイン(一覧) + 右ペイン(エディタ) -->
    <g transform="translate(0, 72)">

      <!-- 左ペイン: メモ一覧 -->
      <g>
        <rect width="170" height="468" fill="#FFFFFF"/>
        <line x1="170" y1="0" x2="170" y2="468" stroke="#D3D1C7" stroke-width="0.5"/>

        <!-- 選択中メモ (ピン留め) -->
        <rect x="0" y="0" width="170" height="58" fill="#E6F1FB"/>
        <line x1="0" y1="58" x2="170" y2="58" stroke="#D3D1C7" stroke-width="0.5"/>
        <text x="10" y="20" font-size="11">📌</text>
        <text x="26" y="20" font-size="13" font-weight="500" fill="#2C2C2A">設計メモ</text>
        <text x="10" y="36" font-size="11" fill="#5F5E5A">IndexedDB を使った...</text>
        <text x="10" y="50" font-size="10" fill="#888780">4/27 14:32</text>

        <!-- メモ2 -->
        <rect x="0" y="58" width="170" height="58" fill="#FFFFFF"/>
        <line x1="0" y1="116" x2="170" y2="116" stroke="#D3D1C7" stroke-width="0.5"/>
        <text x="10" y="78" font-size="13" font-weight="500" fill="#2C2C2A">ようこそ SideMemo</text>
        <text x="10" y="94" font-size="11" fill="#5F5E5A">使い方の説明...</text>
        <text x="10" y="108" font-size="10" fill="#888780">4/27 12:00</text>

        <!-- メモ3 -->
        <rect x="0" y="116" width="170" height="58" fill="#FFFFFF"/>
        <line x1="0" y1="174" x2="170" y2="174" stroke="#D3D1C7" stroke-width="0.5"/>
        <text x="10" y="136" font-size="13" font-weight="500" fill="#2C2C2A">買い物リスト</text>
        <text x="10" y="152" font-size="11" fill="#5F5E5A">- 牛乳 - パン...</text>
        <text x="10" y="166" font-size="10" fill="#888780">4/26 09:15</text>

        <!-- メモ4: 無題 -->
        <rect x="0" y="174" width="170" height="58" fill="#FFFFFF"/>
        <line x1="0" y1="232" x2="170" y2="232" stroke="#D3D1C7" stroke-width="0.5"/>
        <text x="10" y="194" font-size="13" fill="#888780">無題</text>
        <text x="10" y="210" font-size="11" fill="#888780">(空)</text>
        <text x="10" y="224" font-size="10" fill="#888780">4/25 18:00</text>
      </g>

      <!-- 右ペイン: エディタ -->
      <g transform="translate(170, 0)">
        <rect width="350" height="468" fill="#FFFFFF"/>

        <!-- メタ情報バー: タグチップ + ピン/削除 -->
        <g>
          <rect width="350" height="30" fill="#FFFFFF"/>
          <line x1="0" y1="30" x2="350" y2="30" stroke="#D3D1C7" stroke-width="0.5"/>
          <rect x="10" y="6" width="44" height="18" fill="#EEEDFE" rx="9"/>
          <text x="32" y="18" font-size="11" fill="#3C3489" text-anchor="middle">Inbox</text>
          <text x="60" y="20" font-size="12" fill="#888780">+</text>
          <text x="308" y="20" font-size="12">📌</text>
          <text x="328" y="20" font-size="12">🗑</text>
        </g>

        <!-- ページ参照バー -->
        <g transform="translate(0, 30)">
          <rect width="350" height="26" fill="#F1EFE8"/>
          <line x1="0" y1="26" x2="350" y2="26" stroke="#D3D1C7" stroke-width="0.5"/>
          <!-- リンクアイコン -->
          <g transform="translate(10, 8)" stroke="#5F5E5A" stroke-width="1.2" fill="none">
            <path d="M2,5 a3,3 0 0 0 4,3 l2,-2 a3,3 0 0 0 -4,-3 l-1,1"/>
            <path d="M7,4 a3,3 0 0 0 -4,-3 l-2,2 a3,3 0 0 0 4,3 l1,-1"/>
          </g>
          <text x="26" y="18" font-size="11" fill="#5F5E5A">SideMemo 設計書</text>
          <text x="340" y="18" font-size="10" fill="#185FA5" text-anchor="end">+ ページ添付</text>
        </g>

        <!-- ツールバー -->
        <g transform="translate(0, 56)">
          <rect width="350" height="32" fill="#F1EFE8"/>
          <line x1="0" y1="32" x2="350" y2="32" stroke="#D3D1C7" stroke-width="0.5"/>

          <!-- 見出しグループ -->
          <rect x="6" y="6" width="26" height="20" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.3" rx="3"/>
          <text x="19" y="20" font-size="11" font-weight="500" text-anchor="middle">H1</text>
          <rect x="34" y="6" width="26" height="20" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.3" rx="3"/>
          <text x="47" y="20" font-size="10" font-weight="500" text-anchor="middle">H2</text>
          <rect x="62" y="6" width="26" height="20" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.3" rx="3"/>
          <text x="75" y="20" font-size="9" font-weight="500" text-anchor="middle">H3</text>

          <line x1="94" y1="9" x2="94" y2="23" stroke="#D3D1C7" stroke-width="0.5"/>

          <!-- 装飾グループ -->
          <rect x="100" y="6" width="22" height="20" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.3" rx="3"/>
          <text x="111" y="20" font-size="11" font-weight="500" text-anchor="middle">B</text>
          <rect x="124" y="6" width="22" height="20" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.3" rx="3"/>
          <text x="135" y="20" font-size="11" font-style="italic" text-anchor="middle">I</text>
          <rect x="148" y="6" width="22" height="20" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.3" rx="3"/>
          <text x="159" y="20" font-size="11" text-decoration="line-through" text-anchor="middle">S</text>

          <line x1="176" y1="9" x2="176" y2="23" stroke="#D3D1C7" stroke-width="0.5"/>

          <!-- リストグループ -->
          <rect x="182" y="6" width="22" height="20" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.3" rx="3"/>
          <text x="193" y="21" font-size="13" text-anchor="middle">•</text>
          <rect x="206" y="6" width="22" height="20" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.3" rx="3"/>
          <text x="217" y="20" font-size="10" text-anchor="middle">1.</text>
          <rect x="230" y="6" width="22" height="20" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.3" rx="3"/>
          <text x="241" y="20" font-size="11" text-anchor="middle">☐</text>

          <line x1="258" y1="9" x2="258" y2="23" stroke="#D3D1C7" stroke-width="0.5"/>

          <!-- 挿入グループ -->
          <rect x="264" y="6" width="22" height="20" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.3" rx="3"/>
          <text x="275" y="20" font-size="11" text-anchor="middle">🔗</text>
          <rect x="288" y="6" width="22" height="20" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.3" rx="3"/>
          <text x="299" y="20" font-size="9" font-family="monospace" text-anchor="middle">&lt;/&gt;</text>
          <rect x="312" y="6" width="22" height="20" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.3" rx="3"/>
          <text x="323" y="20" font-size="13" text-anchor="middle">"</text>
        </g>

        <!-- 本文エディタ (即時プレビュー) -->
        <g transform="translate(0, 88)">
          <rect width="350" height="380" fill="#FFFFFF"/>

          <!-- H1: 設計メモ -->
          <text x="16" y="28" font-size="18" font-weight="500" fill="#2C2C2A">設計メモ</text>

          <!-- 本文 -->
          <text x="16" y="58" font-size="13" fill="#2C2C2A">IndexedDB を使った<tspan font-weight="500">ローカル完結型</tspan>のメモ</text>
          <text x="16" y="78" font-size="13" fill="#2C2C2A">アプリ。</text>

          <!-- リスト -->
          <text x="16" y="106" font-size="13" fill="#888780">-</text>
          <text x="28" y="106" font-size="13" fill="#2C2C2A">Dexie.js</text>
          <text x="16" y="126" font-size="13" fill="#888780">-</text>
          <text x="28" y="126" font-size="13" fill="#2C2C2A">React</text>
          <text x="16" y="146" font-size="13" fill="#888780">-</text>
          <text x="28" y="146" font-size="13" fill="#2C2C2A">Tailwind</text>
          <!-- カーソル -->
          <line x1="76" y1="135" x2="76" y2="149" stroke="#185FA5" stroke-width="1.5"/>

          <!-- 引用ブロック -->
          <rect x="16" y="166" width="318" height="32" fill="#F1EFE8"/>
          <rect x="16" y="166" width="2" height="32" fill="#888780"/>
          <text x="26" y="186" font-size="12" fill="#5F5E5A">※ ローカルのみで完結し、外部送信なし。</text>

          <!-- コードブロック -->
          <rect x="16" y="214" width="318" height="28" fill="#F1EFE8" rx="4"/>
          <text x="26" y="232" font-size="11" font-family="monospace" fill="#2C2C2A">npm run build</text>
        </g>

        <!-- 自動保存表示 -->
        <text x="340" y="465" font-size="10" fill="#888780" text-anchor="end">✓ 自動保存済</text>
      </g>
    </g>
  </g>

  <!-- 注釈 -->
  <text x="360" y="608" font-size="11" fill="#888780" text-anchor="middle">※ 入力した瞬間に Markdown 構文が整形表示されます (Milkdown WYSIWYG)</text>
</svg>
